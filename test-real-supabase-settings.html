<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Real Supabase Settings Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #1a1a1a;
            color: #ffffff;
        }
        .container {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .status {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .success { background: #2d5a2d; }
        .error { background: #5a2d2d; }
        .info { background: #2d4a5a; }
        .warning { background: #5a5a2d; }
        #output {
            background: #1a1a1a;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 4px;
            height: 400px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }
        .settings-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        .settings-section {
            background: #333;
            padding: 15px;
            border-radius: 8px;
        }
        .setting-item {
            margin: 10px 0;
            padding: 10px;
            background: #444;
            border-radius: 4px;
        }
        .setting-controls {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 10px;
        }
        input, select {
            background: #555;
            color: white;
            border: 1px solid #666;
            padding: 8px;
            border-radius: 4px;
            width: 100%;
            box-sizing: border-box;
        }
        .test-section {
            background: #3a3a3a;
            padding: 15px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .data-display {
            background: #222;
            padding: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
            margin: 10px 0;
            max-height: 200px;
            overflow-y: auto;
        }
        .button-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin: 10px 0;
        }
        .button-group button {
            flex: 1;
            min-width: 150px;
        }
    </style>
</head>
<body>
    <h1>🔧 Real Supabase Settings Test</h1>
    
    <div class="container">
        <h2>Supabase Connection</h2>
        <div class="button-group">
            <button id="testConnection">Test Supabase Connection</button>
            <button id="setUserId">Set User ID</button>
        </div>
        <div id="connectionStatus" class="status info">Click to test connection...</div>
        <div class="setting-item">
            <label>Current User ID:</label>
            <input type="text" id="userIdInput" value="test-user-123" />
        </div>
    </div>

    <div class="container">
        <h2>User Settings Test</h2>
        <div class="settings-grid">
            <div class="settings-section">
                <h3>User Preferences</h3>
                <div class="setting-item">
                    <label>Theme:</label>
                    <select id="themeSelect">
                        <option value="Dark">Dark</option>
                        <option value="Light">Light</option>
                        <option value="White">White</option>
                        <option value="Gold">Gold</option>
                    </select>
                </div>
                <div class="setting-item">
                    <label>Locale:</label>
                    <input type="text" id="localeInput" value="en" />
                </div>
                <div class="setting-item">
                    <label>Accent Color:</label>
                    <input type="color" id="accentColorInput" value="#5865F2" />
                </div>
                <div class="setting-item">
                    <label>Animate GIFs:</label>
                    <select id="animateGifsSelect">
                        <option value="always">Always</option>
                        <option value="hover">Only On Hover</option>
                        <option value="never">Never</option>
                    </select>
                </div>
                <div class="setting-controls">
                    <button id="saveUserPrefs">Save to Supabase</button>
                    <button id="loadUserPrefs">Load from Supabase</button>
                </div>
                <div class="data-display" id="userPrefsDisplay">No data loaded yet...</div>
            </div>
            
            <div class="settings-section">
                <h3>Developer Settings</h3>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="gatewayLogging" /> Gateway Logging
                    </label>
                </div>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="gatewayCompression" checked /> Gateway Compression
                    </label>
                </div>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="showTraces" /> Show Traces
                    </label>
                </div>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="interceptApiTraces" /> Intercept API Traces
                    </label>
                </div>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="cacheSourceMaps" /> Cache Source Maps
                    </label>
                </div>
                <div class="setting-item">
                    <label>
                        <input type="checkbox" id="logBannedFields" /> Log Banned Fields
                    </label>
                </div>
                <div class="setting-controls">
                    <button id="saveDevSettings">Save to Supabase</button>
                    <button id="loadDevSettings">Load from Supabase</button>
                </div>
                <div class="data-display" id="devSettingsDisplay">No data loaded yet...</div>
            </div>
        </div>
    </div>

    <div class="container">
        <h2>Comprehensive Tests</h2>
        <div class="test-section">
            <h3>Test Scenarios</h3>
            <div class="button-group">
                <button id="testSaveLoad">Test Save & Load Cycle</button>
                <button id="testMultipleUsers">Test Multiple Users</button>
                <button id="testDataIntegrity">Test Data Integrity</button>
                <button id="testErrorHandling">Test Error Handling</button>
            </div>
        </div>
        
        <div class="test-section">
            <h3>Batch Operations</h3>
            <div class="button-group">
                <button id="saveAllSettings">Save All Settings</button>
                <button id="loadAllSettings">Load All Settings</button>
                <button id="clearAllSettings">Clear All Settings</button>
                <button id="compareSettings">Compare Local vs Remote</button>
            </div>
        </div>
    </div>

    <div class="container">
        <h2>Output Log</h2>
        <button id="clearLog">Clear Log</button>
        <div id="output"></div>
    </div>

    <script type="module">
        // Import Supabase client
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        // Supabase configuration
        const SUPABASE_URL = 'https://vkgkqcsjgiyadivuxosp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrZ2txY3NqZ2l5YWRpdnV4b3NwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2ODkwODIxNywiZXhwIjoyMDg0NDg0MjE3fQ.nK2z8ekYbvLTPAe7XlizCdyaM-gQXxSaY9rT7m18wtM';

        // Initialize Supabase client
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // DOM elements
        const output = document.getElementById('output');
        const connectionStatus = document.getElementById('connectionStatus');
        const userIdInput = document.getElementById('userIdInput');

        // User preferences elements
        const themeSelect = document.getElementById('themeSelect');
        const localeInput = document.getElementById('localeInput');
        const accentColorInput = document.getElementById('accentColorInput');
        const animateGifsSelect = document.getElementById('animateGifsSelect');
        const userPrefsDisplay = document.getElementById('userPrefsDisplay');

        // Developer settings elements
        const gatewayLoggingCheckbox = document.getElementById('gatewayLogging');
        const gatewayCompressionCheckbox = document.getElementById('gatewayCompression');
        const showTracesCheckbox = document.getElementById('showTraces');
        const interceptApiTracesCheckbox = document.getElementById('interceptApiTraces');
        const cacheSourceMapsCheckbox = document.getElementById('cacheSourceMaps');
        const logBannedFieldsCheckbox = document.getElementById('logBannedFields');
        const devSettingsDisplay = document.getElementById('devSettingsDisplay');

        let currentUserId = 'test-user-123';
        let connectionOk = false;

        // Utility functions
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logMessage = `[${timestamp}] ${message}\n`;
            output.textContent += logMessage;
            output.scrollTop = output.scrollHeight;
            console.log(message);
        }

        function updateStatus(element, message, type) {
            element.textContent = message;
            element.className = `status ${type}`;
        }

        function displayData(element, data, label) {
            element.textContent = `${label}:\n${JSON.stringify(data, null, 2)}`;
        }

        // Supabase functions
        async function getUserPreferences(userId) {
            try {
                const { data, error } = await supabase
                    .from('user_preferences')
                    .select('*')
                    .eq('user_id', userId)
                    .single();
                
                if (error) {
                    if (error.code === 'PGRST116') {
                        return null; // No rows found
                    }
                    throw error;
                }
                return data;
            } catch (error) {
                log(`❌ Error getting user preferences: ${error.message}`);
                throw error;
            }
        }

        async function updateUserPreferences(userId, prefs) {
            try {
                const { data, error } = await supabase
                    .from('user_preferences')
                    .upsert({
                        user_id: userId,
                        ...prefs,
                        updated_at: new Date().toISOString()
                    })
                    .select()
                    .single();
                
                if (error) throw error;
                return data;
            } catch (error) {
                log(`❌ Error updating user preferences: ${error.message}`);
                throw error;
            }
        }

        async function getDeveloperSettings(userId) {
            try {
                const { data, error } = await supabase
                    .from('developer_settings')
                    .select('*')
                    .eq('user_id', userId)
                    .single();
                
                if (error) {
                    if (error.code === 'PGRST116') {
                        return null; // No rows found
                    }
                    throw error;
                }
                return data;
            } catch (error) {
                log(`❌ Error getting developer settings: ${error.message}`);
                throw error;
            }
        }

        async function setDeveloperSettings(userId, settings) {
            try {
                const { data, error } = await supabase
                    .from('developer_settings')
                    .upsert({
                        user_id: userId,
                        settings: settings,
                        updated_at: new Date().toISOString()
                    })
                    .select()
                    .single();
                
                if (error) throw error;
                return data;
            } catch (error) {
                log(`❌ Error setting developer settings: ${error.message}`);
                throw error;
            }
        }

        // Test functions
        async function testConnection() {
            updateStatus(connectionStatus, 'Testing connection...', 'info');
            log('🔌 Testing Supabase connection...');

            try {
                // Test by trying to query user preferences
                const { data, error } = await supabase
                    .from('user_preferences')
                    .select('count')
                    .limit(1);
                
                if (error) throw error;
                
                updateStatus(connectionStatus, '✅ Connection successful!', 'success');
                log('✅ Supabase connection test passed');
                connectionOk = true;
                
                // Enable all buttons
                document.querySelectorAll('button:not(#testConnection):not(#setUserId)').forEach(btn => {
                    btn.disabled = false;
                });
                
            } catch (error) {
                updateStatus(connectionStatus, `❌ Connection failed: ${error.message}`, 'error');
                log(`❌ Connection test failed: ${error.message}`);
                connectionOk = false;
            }
        }

        async function saveUserPreferences() {
            try {
                const prefs = {
                    locale: localeInput.value,
                    theme: themeSelect.value,
                    accent_color: accentColorInput.value,
                    animate_gifs: animateGifsSelect.value,
                    animate_icons: 'always', // Default value
                    volume: 50,
                    notisound: 'default'
                };

                log(`💾 Saving user preferences for ${currentUserId}...`);
                const result = await updateUserPreferences(currentUserId, prefs);
                
                if (result) {
                    log('✅ User preferences saved successfully');
                    displayData(userPrefsDisplay, result, 'Saved User Preferences');
                } else {
                    throw new Error('Save returned null');
                }
            } catch (error) {
                log(`❌ Failed to save user preferences: ${error.message}`);
            }
        }

        async function loadUserPreferences() {
            try {
                log(`📥 Loading user preferences for ${currentUserId}...`);
                const prefs = await getUserPreferences(currentUserId);
                
                if (prefs) {
                    // Update form fields
                    localeInput.value = prefs.locale || 'en';
                    themeSelect.value = prefs.theme || 'Dark';
                    accentColorInput.value = prefs.accent_color || '#5865F2';
                    animateGifsSelect.value = prefs.animate_gifs || 'hover';
                    
                    log('✅ User preferences loaded successfully');
                    displayData(userPrefsDisplay, prefs, 'Loaded User Preferences');
                } else {
                    log('⚠️ No user preferences found');
                    displayData(userPrefsDisplay, null, 'No User Preferences Found');
                }
            } catch (error) {
                log(`❌ Failed to load user preferences: ${error.message}`);
            }
        }

        async function saveDeveloperSettings() {
            try {
                const settings = {
                    gatewayLogging: gatewayLoggingCheckbox.checked,
                    gatewayCompression: gatewayCompressionCheckbox.checked,
                    showTraces: showTracesCheckbox.checked,
                    interceptApiTraces: interceptApiTracesCheckbox.checked,
                    cacheSourceMaps: cacheSourceMapsCheckbox.checked,
                    logBannedFields: logBannedFieldsCheckbox.checked,
                    reportSystem: false // Default value
                };

                log(`💾 Saving developer settings for ${currentUserId}...`);
                const result = await setDeveloperSettings(currentUserId, settings);
                
                if (result) {
                    log('✅ Developer settings saved successfully');
                    displayData(devSettingsDisplay, result, 'Saved Developer Settings');
                } else {
                    throw new Error('Save returned null');
                }
            } catch (error) {
                log(`❌ Failed to save developer settings: ${error.message}`);
            }
        }

        async function loadDeveloperSettings() {
            try {
                log(`📥 Loading developer settings for ${currentUserId}...`);
                const settings = await getDeveloperSettings(currentUserId);
                
                if (settings && settings.settings) {
                    // Update form fields
                    const s = settings.settings;
                    gatewayLoggingCheckbox.checked = s.gatewayLogging || false;
                    gatewayCompressionCheckbox.checked = s.gatewayCompression !== false;
                    showTracesCheckbox.checked = s.showTraces || false;
                    interceptApiTracesCheckbox.checked = s.interceptApiTraces || false;
                    cacheSourceMapsCheckbox.checked = s.cacheSourceMaps || false;
                    logBannedFieldsCheckbox.checked = s.logBannedFields || false;
                    
                    log('✅ Developer settings loaded successfully');
                    displayData(devSettingsDisplay, settings, 'Loaded Developer Settings');
                } else {
                    log('⚠️ No developer settings found');
                    displayData(devSettingsDisplay, null, 'No Developer Settings Found');
                }
            } catch (error) {
                log(`❌ Failed to load developer settings: ${error.message}`);
            }
        }

        async function testSaveLoad() {
            log('🧪 Testing save & load cycle...');
            
            try {
                // Save user preferences
                await saveUserPreferences();
                await new Promise(resolve => setTimeout(resolve, 1000)); // Wait for save
                
                // Load user preferences
                await loadUserPreferences();
                
                // Save developer settings
                await saveDeveloperSettings();
                await new Promise(resolve => setTimeout(resolve, 1000)); // Wait for save
                
                // Load developer settings
                await loadDeveloperSettings();
                
                log('✅ Save & load cycle completed successfully');
            } catch (error) {
                log(`❌ Save & load cycle failed: ${error.message}`);
            }
        }

        async function testMultipleUsers() {
            log('🧪 Testing multiple users...');
            
            const testUsers = ['user-1', 'user-2', 'user-3'];
            
            for (const userId of testUsers) {
                try {
                    currentUserId = userId;
                    userIdInput.value = userId;
                    
                    // Save unique settings for each user
                    await updateUserPreferences(userId, {
                        locale: `locale-${userId}`,
                        theme: userId === 'user-1' ? 'Dark' : userId === 'user-2' ? 'Light' : 'Gold',
                        accent_color: `#${userId.slice(-6)}`
                    });
                    
                    await setDeveloperSettings(userId, {
                        gatewayLogging: userId === 'user-1',
                        showTraces: userId === 'user-2',
                        cacheSourceMaps: userId === 'user-3'
                    });
                    
                    log(`✅ Settings saved for ${userId}`);
                } catch (error) {
                    log(`❌ Failed to save settings for ${userId}: ${error.message}`);
                }
            }
            
            // Switch back to original user
            currentUserId = 'test-user-123';
            userIdInput.value = currentUserId;
            
            log('✅ Multiple users test completed');
        }

        async function testDataIntegrity() {
            log('🧪 Testing data integrity...');
            
            try {
                // Save complex data
                const complexPrefs = {
                    locale: 'fr-FR',
                    theme: 'Gold',
                    accent_color: '#FF6B6B',
                    animate_gifs: 'never',
                    animate_icons: 'hover',
                    volume: 75,
                    notisound: 'custom'
                };
                
                await updateUserPreferences(currentUserId, complexPrefs);
                
                // Load and verify
                const loaded = await getUserPreferences(currentUserId);
                
                const integrityCheck = 
                    loaded.locale === complexPrefs.locale &&
                    loaded.theme === complexPrefs.theme &&
                    loaded.accent_color === complexPrefs.accent_color &&
                    loaded.animate_gifs === complexPrefs.animate_gifs &&
                    loaded.volume === complexPrefs.volume;
                
                if (integrityCheck) {
                    log('✅ Data integrity test passed');
                } else {
                    log('❌ Data integrity test failed - data mismatch');
                    log(`Expected: ${JSON.stringify(complexPrefs)}`);
                    log(`Loaded: ${JSON.stringify(loaded)}`);
                }
            } catch (error) {
                log(`❌ Data integrity test failed: ${error.message}`);
            }
        }

        async function testErrorHandling() {
            log('🧪 Testing error handling...');
            
            try {
                // Test with invalid user ID
                const result = await getUserPreferences('invalid-user-id-format');
                log(`✅ Invalid user ID handled: ${result === null ? 'correctly returned null' : 'unexpected result'}`);
                
                // Test with malformed data
                try {
                    await updateUserPreferences(currentUserId, { invalid_field: 'test' });
                    log('⚠️ Malformed data accepted (may be expected)');
                } catch (error) {
                    log('✅ Malformed data correctly rejected');
                }
                
            } catch (error) {
                log(`❌ Error handling test failed: ${error.message}`);
            }
        }

        async function saveAllSettings() {
            log('💾 Saving all settings...');
            await saveUserPreferences();
            await saveDeveloperSettings();
            log('✅ All settings saved');
        }

        async function loadAllSettings() {
            log('📥 Loading all settings...');
            await loadUserPreferences();
            await loadDeveloperSettings();
            log('✅ All settings loaded');
        }

        async function clearAllSettings() {
            log('🗑️ Clearing all settings...');
            
            try {
                await supabase
                    .from('user_preferences')
                    .delete()
                    .eq('user_id', currentUserId);
                
                await supabase
                    .from('developer_settings')
                    .delete()
                    .eq('user_id', currentUserId);
                
                log('✅ All settings cleared');
                
                // Clear displays
                userPrefsDisplay.textContent = 'No data loaded yet...';
                devSettingsDisplay.textContent = 'No data loaded yet...';
            } catch (error) {
                log(`❌ Failed to clear settings: ${error.message}`);
            }
        }

        async function compareSettings() {
            log('🔍 Comparing local vs remote settings...');
            
            try {
                const remoteUserPrefs = await getUserPreferences(currentUserId);
                const remoteDevSettings = await getDeveloperSettings(currentUserId);
                
                const localUserPrefs = {
                    locale: localeInput.value,
                    theme: themeSelect.value,
                    accent_color: accentColorInput.value,
                    animate_gifs: animateGifsSelect.value
                };
                
                const localDevSettings = {
                    gatewayLogging: gatewayLoggingCheckbox.checked,
                    gatewayCompression: gatewayCompressionCheckbox.checked,
                    showTraces: showTracesCheckbox.checked,
                    interceptApiTraces: interceptApiTracesCheckbox.checked,
                    cacheSourceMaps: cacheSourceMapsCheckbox.checked,
                    logBannedFields: logBannedFieldsCheckbox.checked
                };
                
                const userPrefsMatch = JSON.stringify(localUserPrefs) === JSON.stringify({
                    locale: remoteUserPrefs?.locale,
                    theme: remoteUserPrefs?.theme,
                    accent_color: remoteUserPrefs?.accent_color,
                    animate_gifs: remoteUserPrefs?.animate_gifs
                });
                
                const devSettingsMatch = remoteDevSettings?.settings && 
                    JSON.stringify(localDevSettings) === JSON.stringify(remoteDevSettings.settings);
                
                log(`User preferences match: ${userPrefsMatch ? '✅' : '❌'}`);
                log(`Developer settings match: ${devSettingsMatch ? '✅' : '❌'}`);
                
                if (!userPrefsMatch) {
                    log('Local user prefs:', localUserPrefs);
                    log('Remote user prefs:', remoteUserPrefs);
                }
                
                if (!devSettingsMatch) {
                    log('Local dev settings:', localDevSettings);
                    log('Remote dev settings:', remoteDevSettings?.settings);
                }
                
            } catch (error) {
                log(`❌ Comparison failed: ${error.message}`);
            }
        }

        function setUserId() {
            currentUserId = userIdInput.value;
            localStorage.setItem('currentUserId', currentUserId);
            log(`👤 User ID set to: ${currentUserId}`);
        }

        // Event listeners
        document.getElementById('testConnection').addEventListener('click', testConnection);
        document.getElementById('setUserId').addEventListener('click', setUserId);
        document.getElementById('saveUserPrefs').addEventListener('click', saveUserPreferences);
        document.getElementById('loadUserPrefs').addEventListener('click', loadUserPreferences);
        document.getElementById('saveDevSettings').addEventListener('click', saveDeveloperSettings);
        document.getElementById('loadDevSettings').addEventListener('click', loadDeveloperSettings);
        document.getElementById('testSaveLoad').addEventListener('click', testSaveLoad);
        document.getElementById('testMultipleUsers').addEventListener('click', testMultipleUsers);
        document.getElementById('testDataIntegrity').addEventListener('click', testDataIntegrity);
        document.getElementById('testErrorHandling').addEventListener('click', testErrorHandling);
        document.getElementById('saveAllSettings').addEventListener('click', saveAllSettings);
        document.getElementById('loadAllSettings').addEventListener('click', loadAllSettings);
        document.getElementById('clearAllSettings').addEventListener('click', clearAllSettings);
        document.getElementById('compareSettings').addEventListener('click', compareSettings);
        document.getElementById('clearLog').addEventListener('click', () => {
            output.textContent = '';
        });

        // Initialize
        log('🔧 Real Supabase Settings Test loaded');
        log('Click "Test Supabase Connection" to begin');
        
        // Set initial user ID
        const savedUserId = localStorage.getItem('currentUserId');
        if (savedUserId) {
            currentUserId = savedUserId;
            userIdInput.value = savedUserId;
        }
    </script>
</body>
</html>
