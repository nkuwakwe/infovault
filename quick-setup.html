<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Test Setup</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
        .result { background: #f8f9fa; border: 1px solid #dee2e6; padding: 10px; border-radius: 5px; margin: 10px 0; white-space: pre-wrap; font-family: monospace; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h1>Quick Test Setup</h1>
    <button onclick="setupTest()">Setup Test User & Guild Member</button>
    <button onclick="checkData()">Check Database</button>
    <div id="result" class="result" style="display:none;"></div>

    <script>
        const TEST_USER_ID = '1467547943007048202';
        const TEST_GUILD_ID = '1474366047023890265';
        const TEST_CHANNEL_ID = '1474366308060620801';
        
        const SUPABASE_URL = 'https://vkgkqcsjgiyadivuxosp.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrZ2txY3NqZ2l5YWRpdnV4b3NwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2ODkwODIxNywiZXhwIjoyMDg0NDg0MjE3fQ.nK2z8ekYbvLTPAe7XlizCdyaM-gQXxSaY9rT7m18wtM';

        let supabaseClient = null;

        async function getSupabaseClient() {
            if (!supabaseClient) {
                await loadScript('https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js');
                supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            }
            return supabaseClient;
        }

        function loadScript(src) {
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.onload = resolve;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function setupTest() {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            
            try {
                resultDiv.textContent = 'Setting up test data...';
                const client = await getSupabaseClient();

                // Create user
                const userData = {
                    id: TEST_USER_ID,
                    name: 'Test User',
                    username: 'testuser',
                    user_id: TEST_USER_ID,
                    pfp: 'https://cdn.rory.server.spacebar.chat/embed/avatars/5.png',
                    created_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };
                
                await client.from('users').upsert(userData).single();
                
                // Create guild member
                const memberData = {
                    id: 'member-' + Date.now(),
                    guild_id: TEST_GUILD_ID,
                    user_id: TEST_USER_ID,
                    joined_at: new Date().toISOString(),
                    updated_at: new Date().toISOString()
                };
                
                await client.from('guild_members').upsert(memberData).single();
                
                resultDiv.textContent = '✅ Test data setup complete!';
                resultDiv.className = 'result success';
                
            } catch (error) {
                resultDiv.textContent = `❌ Error: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }

        async function checkData() {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result';
            
            try {
                const client = await getSupabaseClient();
                
                // Check user
                const { data: user } = await client.from('users').select('*').eq('id', TEST_USER_ID).single();
                
                // Check guild member
                const { data: member } = await client.from('guild_members').select('*').eq('user_id', TEST_USER_ID).single();
                
                resultDiv.textContent = `User: ${user?.name || 'Not found'}\nGuild Member: ${member ? 'Found' : 'Not found'}\nGuild ID: ${member?.guild_id || 'N/A'}`;
                resultDiv.className = 'result success';
                
            } catch (error) {
                resultDiv.textContent = `❌ Error: ${error.message}`;
                resultDiv.className = 'result error';
            }
        }
    </script>
</body>
</html>
