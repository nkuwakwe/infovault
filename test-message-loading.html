<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Loading from Supabase Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
            background-color: #1a1a1a;
            color: #ffffff;
        }
        .container {
            background: #2a2a2a;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
        }
        button:hover {
            background: #45a049;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .status {
            margin: 10px 0;
            padding: 10px;
            border-radius: 4px;
        }
        .success { background: #2d5a2d; }
        .error { background: #5a2d2d; }
        .info { background: #2d4a5a; }
        .warning { background: #5a5a2d; }
        #output {
            background: #1a1a1a;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 4px;
            height: 300px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
            white-space: pre-wrap;
        }
        .test-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        .test-section {
            background: #333;
            padding: 15px;
            border-radius: 8px;
        }
        .metric-item {
            background: #333;
            padding: 10px;
            margin: 5px 0;
            border-radius: 4px;
            display: flex;
            justify-content: space-between;
        }
        .message-list {
            background: #1a1a1a;
            border: 1px solid #444;
            padding: 10px;
            border-radius: 4px;
            height: 200px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 11px;
        }
        .message-item {
            padding: 5px;
            margin: 2px 0;
            background: #2a2a2a;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <h1>📥 Message Loading from Supabase Test</h1>
    <p>Testing that messages are properly loaded from Supabase database</p>
    
    <div class="container">
        <h2>🧪 Test Controls</h2>
        <div class="button-group">
            <button id="checkMessages">Check Messages in Database</button>
            <button id="testChannelLoading">Test Channel Loading</button>
            <button id="simulateRefresh">Simulate Page Refresh</button>
            <button id="clearResults">Clear Results</button>
        </div>
        <div id="testStatus" class="status info">Ready to test...</div>
    </div>

    <div class="test-grid">
        <div class="test-section">
            <h3>📊 Database Messages</h3>
            <div id="databaseInfo"></div>
            <div id="messageList" class="message-list"></div>
        </div>
        
        <div class="test-section">
            <h3>🔄 Test Results</h3>
            <div id="testResults"></div>
        </div>
    </div>

    <div class="container">
        <h2>📋 Test Log</h2>
        <button id="clearLog">Clear Log</button>
        <div id="output"></div>
    </div>

    <script type="module">
        // Import Supabase client
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

        // Supabase configuration
        const SUPABASE_URL = 'https://vkgkqcsjgiyadivuxosp.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZrZ2txY3NqZ2l5YWRpdnV4b3NwIiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2ODkwODIxNywiZXhwIjoyMDg0NDg0MjE3fQ.nK2z8ekYbvLTPAe7XlizCdyaM-gQXxSaY9rT7m18wtM';

        // DOM elements
        const output = document.getElementById('output');
        const testStatus = document.getElementById('testStatus');
        const databaseInfo = document.getElementById('databaseInfo');
        const testResults = document.getElementById('testResults');
        const messageList = document.getElementById('messageList');

        // Test state
        let supabaseClient = null;
        let testChannelId = 'test-channel-id'; // This would be the actual Discord channel ID

        // Utility functions
        function log(message, type = 'info') {
            const timestamp = new Date().toLocaleTimeString();
            const logMessage = `[${timestamp}] ${message}\n`;
            output.textContent += logMessage;
            output.scrollTop = output.scrollHeight;
            console.log(message);
        }

        function updateStatus(element, message, type) {
            element.textContent = message;
            element.className = `status ${type}`;
        }

        function updateDatabaseInfo(messages) {
            databaseInfo.innerHTML = `
                <div class="metric-item">
                    <span>Total Messages:</span>
                    <span>${messages.length}</span>
                </div>
                <div class="metric-item">
                    <span>Test Channel:</span>
                    <span>${testChannelId}</span>
                </div>
                <div class="metric-item">
                    <span>Time Range:</span>
                    <span>${messages.length > 0 ? getTimeRange(messages) : 'N/A'}</span>
                </div>
            `;

            // Display messages
            messageList.innerHTML = messages.map(msg => `
                <div class="message-item">
                    <strong>${msg.id}</strong> - ${new Date(msg.timestamp).toLocaleString()}<br>
                    ${msg.content || '<em>No content</em>'}
                </div>
            `).join('');
        }

        function getTimeRange(messages) {
            if (messages.length === 0) return 'N/A';
            const timestamps = messages.map(m => new Date(m.timestamp));
            const oldest = new Date(Math.min(...timestamps));
            const newest = new Date(Math.max(...timestamps));
            return `${oldest.toLocaleDateString()} - ${newest.toLocaleDateString()}`;
        }

        function updateTestResults(results) {
            testResults.innerHTML = results.map(result => 
                `<div class="metric-item">
                    <span>${result.test}:</span>
                    <span style="color: ${result.passed ? '#4CAF50' : '#f44336'}">${result.passed ? '✅ PASS' : '❌ FAIL'}</span>
                </div>`
            ).join('');
        }

        // Initialize Supabase client
        async function initSupabase() {
            if (!supabaseClient) {
                supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                log('✅ Supabase client initialized');
            }
        }

        // Get messages from database
        async function getMessagesFromDB(channelId) {
            await initSupabase();
            
            try {
                const { data, error } = await supabaseClient
                    .from('messages')
                    .select('*')
                    .eq('channel_id', channelId)
                    .order('timestamp', { ascending: false })
                    .limit(50);

                if (error) {
                    throw error;
                }
                
                return data || [];
            } catch (error) {
                log(`❌ Error getting messages: ${error.message}`);
                return [];
            }
        }

        // Test functions
        async function checkMessages() {
            log('🔍 Checking messages in database...');
            updateStatus(testStatus, 'Checking messages...', 'progress');
            
            const messages = await getMessagesFromDB(testChannelId);
            updateDatabaseInfo(messages);
            
            updateStatus(testStatus, `✅ Found ${messages.length} messages`, 'success');
            log(`✅ Found ${messages.length} messages in database`);
        }

        async function testChannelLoading() {
            log('📥 Testing channel message loading...');
            updateStatus(testStatus, 'Testing channel loading...', 'progress');
            
            try {
                // Simulate the channel loading process
                const messages = await getMessagesFromDB(testChannelId);
                
                const results = [];
                
                // Test 1: Messages are loaded
                results.push({
                    test: 'Messages Loaded',
                    passed: messages.length > 0
                });
                
                // Test 2: Messages are in chronological order
                if (messages.length > 1) {
                    const sorted = [...messages].sort((a, b) => 
                        new Date(a.timestamp).getTime() - new Date(b.timestamp).getTime()
                    );
                    const isOrdered = messages.every((msg, index) => 
                        index === 0 || new Date(msg.timestamp).getTime() >= new Date(messages[index-1].timestamp).getTime()
                    );
                    results.push({
                        test: 'Chronological Order',
                        passed: isOrdered
                    });
                } else {
                    results.push({
                        test: 'Chronological Order',
                        passed: true // Not enough messages to test
                    });
                }
                
                // Test 3: Message format is correct
                const hasCorrectFormat = messages.every(msg => 
                    msg.id && msg.channel_id && msg.author_id && msg.timestamp
                );
                results.push({
                    test: 'Message Format',
                    passed: hasCorrectFormat
                });
                
                updateTestResults(results);
                updateDatabaseInfo(messages);
                
                const allPassed = results.every(r => r.passed);
                updateStatus(testStatus, allPassed ? '✅ Channel loading test passed!' : '❌ Some tests failed', 
                    allPassed ? 'success' : 'error');
                
                log(`✅ Channel loading test completed - ${results.filter(r => r.passed).length}/${results.length} tests passed`);
                
            } catch (error) {
                updateStatus(testStatus, `❌ Channel loading test failed: ${error.message}`, 'error');
                log(`❌ Channel loading test failed: ${error.message}`);
            }
        }

        async function simulateRefresh() {
            log('🔄 Simulating page refresh scenario...');
            updateStatus(testStatus, 'Simulating page refresh...', 'progress');
            
            try {
                // Step 1: Get initial message count
                const initialMessages = await getMessagesFromDB(testChannelId);
                log(`📊 Initial message count: ${initialMessages.length}`);
                
                // Step 2: Simulate loading messages (like the channel.putmessages() method)
                log('📥 Simulating channel.putmessages() with Supabase loading...');
                
                // This simulates what happens in loadMessagesFromSupabase()
                const loadedMessages = await getMessagesFromDB(testChannelId);
                
                // Step 3: Verify messages are loaded correctly
                const results = [];
                
                results.push({
                    test: 'Messages Available',
                    passed: loadedMessages.length > 0
                });
                
                results.push({
                    test: 'No Duplicates Created',
                    passed: loadedMessages.length === initialMessages.length
                });
                
                results.push({
                    test: 'Messages in Order',
                    passed: loadedMessages.every((msg, index) => 
                        index === 0 || new Date(msg.timestamp).getTime() <= new Date(loadedMessages[index-1].timestamp).getTime()
                    )
                });
                
                updateTestResults(results);
                
                const allPassed = results.every(r => r.passed);
                updateStatus(testStatus, allPassed ? '✅ Page refresh simulation passed!' : '❌ Simulation failed', 
                    allPassed ? 'success' : 'error');
                
                log(`✅ Page refresh simulation completed - ${results.filter(r => r.passed).length}/${results.length} tests passed`);
                
            } catch (error) {
                updateStatus(testStatus, `❌ Page refresh simulation failed: ${error.message}`, 'error');
                log(`❌ Page refresh simulation failed: ${error.message}`);
            }
        }

        // Event listeners
        document.getElementById('checkMessages').addEventListener('click', checkMessages);
        document.getElementById('testChannelLoading').addEventListener('click', testChannelLoading);
        document.getElementById('simulateRefresh').addEventListener('click', simulateRefresh);

        document.getElementById('clearResults').addEventListener('click', () => {
            updateStatus(testStatus, 'Ready to test...', 'info');
            updateDatabaseInfo([]);
            updateTestResults([]);
        });

        document.getElementById('clearLog').addEventListener('click', () => {
            output.textContent = '';
        });

        // Initialize display
        updateDatabaseInfo([]);
        updateTestResults([]);
        
        log('📥 Message Loading from Supabase Test loaded');
        log('📊 Click "Check Messages" to start testing');
    </script>
</body>
</html>
