<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up - Infovault</title>
  <meta content="Fermi" property="og:title" />
  <meta content="Join a community of people and start chatting!" property="og:description" />
  <meta content="/logo.webp" property="og:image" />
  <meta content="#dbb056" name="theme-color" />

  <!-- Using Poppins from Google Fonts to match Figma export -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
    }

    body {
      background: linear-gradient(270deg, rgba(246,142,16,0) 0%, rgba(255,166,0,0.1) 0%, rgba(255,166,0,0.2) 100%),
                  linear-gradient(0deg, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Poppins", Helvetica, sans-serif;
      color: #ffffff;
    }

    .frame {
      width: 100%;
      max-width: 375px;
      min-height: 812px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .signup-card {
      width: 358px;
      max-width: 100%;
      height: auto;
      min-height: 650px;
      background: linear-gradient(270deg, rgba(246,142,16,0) 0%, rgba(255,166,0,0.14) 0%, rgba(255,166,0,0.27) 100%),
                  linear-gradient(0deg, rgba(0,0,0,1) 0%, rgba(0,0,0,1) 100%);
      border: 1px solid #dbb056;
      border-radius: 12px;
      box-shadow: 0px 4px 4px rgba(0,0,0,0.25);
      padding: 0 0 40px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo-area {
      margin-top: 14px;
      margin-bottom: 28px;
      width: 186px;
      height: 71px;
    }

    .logo-area img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .welcome-title {
      font-family: "Poppins", sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: #ffffff;
      text-align: center;
      margin-bottom: 9px;
    }

    .subtitle {
      font-family: "Poppins", sans-serif;
      font-weight: 700;
      font-size: 16px;
      color: #ffffff;
      text-align: center;
      margin-bottom: 32px;
    }

    .field-label {
      align-self: flex-start;
      margin-left: 19px;
      margin-top: 23px;
      font-family: "Poppins", sans-serif;
      font-weight: 700;
      font-size: 20px;
      color: #dbb056;
    }

    .field-label + .field-label {
      margin-top: 9px;
    }

    .input-wrapper {
      width: 293px;
      height: 52px;
      margin-top: 6px;
      background-color: rgba(0,0,0,0.37);
      border: 1px solid rgba(219,176,86,0.25);
      border-radius: 11px;
      display: flex;
      align-items: center;
      padding-left: 7px;
      gap: 17px;
    }

    .input-icon {
      width: 37px;
      height: 27px;
      object-fit: contain;
    }

    .input-field {
      background: transparent;
      border: none;
      outline: none;
      color: rgba(255,255,255,0.69);
      font-family: "Poppins", sans-serif;
      font-weight: 600;
      font-size: 15px;
      width: 100%;
      height: 100%;
    }

    .input-field::placeholder {
      color: rgba(255,255,255,0.4);
    }

    .submit-btn {
      margin-top: 32px;
      width: 293px;
      padding: 14px;
      background: linear-gradient(90deg, #f68e10, #ffa600);
      color: white;
      font-family: "Poppins", sans-serif;
      font-weight: 700;
      font-size: 16px;
      border: none;
      border-radius: 11px;
      cursor: pointer;
      transition: opacity 0.3s;
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .login-link {
      margin-top: 20px;
      font-family: "Poppins", sans-serif;
      font-size: 14px;
      color: #dbb056;
    }

    .login-link a {
      color: #ffa600;
      text-decoration: none;
      cursor: pointer;
    }

    .login-link a:hover {
      text-decoration: underline;
    }

    .error-message {
      color: #ff6b6b;
      font-family: "Poppins", sans-serif;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .error-message.show {
      display: block;
    }

    .success-message {
      color: #51cf66;
      font-family: "Poppins", sans-serif;
      font-size: 14px;
      margin-top: 10px;
      text-align: center;
      display: none;
    }

    .success-message.show {
      display: block;
    }
  </style>
</head>
<body>

  <div class="frame">
    <div class="signup-card">

      <!-- Logo -->
      <div class="logo-area">
        <img src="/logo.webp" alt="Infovault logo">
      </div>

      <div class="welcome-title">This is easily your best move year</div>
      <div class="subtitle">Create your key</div>

      <div style="width:100%; display:flex; flex-direction:column; align-items:center;">

        <div class="field-label">Email</div>
        <div class="input-wrapper">
          <img src="/email_icon.png" class="input-icon" alt="email">
          <input id="signup-email" class="input-field" type="email" placeholder="willsoonmakeit@gmail.com">
        </div>

        <div class="field-label">Password</div>
        <div class="input-wrapper">
          <img src="/password_icon.png" class="input-icon" alt="lock">
          <input id="signup-password" class="input-field" type="password" placeholder="••••••••">
        </div>

        <div class="field-label">Confirm Password</div>
        <div class="input-wrapper">
          <img src="/password_icon.png" class="input-icon" alt="lock">
          <input id="signup-password-confirm" class="input-field" type="password" placeholder="••••••••">
        </div>

        <button class="submit-btn" id="signup-submit">Sign Up</button>

        <div class="error-message" id="error-message"></div>
        <div class="success-message" id="success-message"></div>

        <div class="login-link">
          Already have an account? <a href="/login">Log in here</a>
        </div>

      </div>

    </div>
  </div>

  <script>
    const signupBtn = document.getElementById('signup-submit');
    const emailInput = document.getElementById('signup-email');
    const passwordInput = document.getElementById('signup-password');
    const passwordConfirmInput = document.getElementById('signup-password-confirm');
    const errorMessage = document.getElementById('error-message');
    const successMessage = document.getElementById('success-message');

    signupBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      const passwordConfirm = passwordConfirmInput.value;

      // Reset messages
      errorMessage.classList.remove('show');
      successMessage.classList.remove('show');

      // Validation
      if (!email) {
        showError('Please enter an email address');
        return;
      }

      if (!password || !passwordConfirm) {
        showError('Please enter a password');
        return;
      }

      if (password !== passwordConfirm) {
        showError('Passwords do not match');
        return;
      }

      if (password.length < 6) {
        showError('Password must be at least 6 characters');
        return;
      }

      try {
        signupBtn.disabled = true;
        signupBtn.textContent = 'Creating account...';

        const resp = await fetch('https://vkgkqcsjgiyadivuxosp.supabase.co/auth/v1/signup', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': 'sb_publishable_ErhOA0SIFaLJKXAIovqu8A_CSaXxW7q'
          },
          body: JSON.stringify({
            email: email,
            password: password
          })
        });

        const data = await resp.json();
        console.log('Signup response:', data); // Debug log

        if (!resp.ok) {
          showError('Sign up failed: ' + (data.error_description || data.error || 'Unknown error'));
          signupBtn.disabled = false;
          signupBtn.textContent = 'Sign Up';
          return;
        }

        // Success - redirect after delay
        showSuccess('Account created successfully! Redirecting to login...');
        setTimeout(() => {
          window.location.href = '/login';
        }, 3000);
      } catch (e) {
        showError('Sign up failed: ' + (e instanceof Error ? e.message : String(e)));
        signupBtn.disabled = false;
        signupBtn.textContent = 'Sign Up';
      }
    });

    function showError(msg) {
      errorMessage.textContent = msg;
      errorMessage.classList.add('show');
    }

    function showSuccess(msg) {
      successMessage.textContent = msg;
      successMessage.classList.add('show');
    }
  </script>

</body>
</html>
